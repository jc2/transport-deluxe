services:
  db-test-reset:
    image: postgres:16
    profiles: ["test"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    command: >
      bash -c "
        until pg_isready -h postgres -U postgres; do sleep 1; done &&
        psql -h postgres -U postgres -c 'DROP DATABASE IF EXISTS transport_deluxe_test;' &&
        psql -h postgres -U postgres -c 'CREATE DATABASE transport_deluxe_test;' &&
        psql -h postgres -U postgres -d transport_deluxe_test -c '
          CREATE SCHEMA IF NOT EXISTS fuel_cost_config;
          CREATE SCHEMA IF NOT EXISTS driver_tariff_config;
          CREATE SCHEMA IF NOT EXISTS base_margin_config;
          CREATE SCHEMA IF NOT EXISTS lead_time_config;
          CREATE SCHEMA IF NOT EXISTS costing_engine;
          CREATE SCHEMA IF NOT EXISTS margin_engine;
          CREATE SCHEMA IF NOT EXISTS pricing_engine;
        '
      "

  fuel-cost-config-tests:
    build: ./local_services/fuel_cost_config
    command: pytest tests/ -v
    profiles: ["test"]
    depends_on:
      db-test-reset:
        condition: service_completed_successfully
      casdoor:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres/transport_deluxe_test
      DB_SCHEMA: fuel_cost_config
      CASDOOR_JWKS_URL: http://casdoor:8000/.well-known/jwks
      CASDOOR_ISSUER: http://localhost:8000
      CASDOOR_URL: http://casdoor:8000

  driver-tariff-config-tests:
    build: ./local_services/driver_tariff_config
    command: pytest tests/ -v
    profiles: ["test"]
    depends_on:
      db-test-reset:
        condition: service_completed_successfully
      casdoor:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres/transport_deluxe_test
      DB_SCHEMA: driver_tariff_config
      CASDOOR_JWKS_URL: http://casdoor:8000/.well-known/jwks
      CASDOOR_ISSUER: http://localhost:8000
      CASDOOR_URL: http://casdoor:8000

  base-margin-config-tests:
    build: ./local_services/base_margin_config
    command: pytest tests/ -v
    profiles: ["test"]
    depends_on:
      db-test-reset:
        condition: service_completed_successfully
      casdoor:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres/transport_deluxe_test
      DB_SCHEMA: base_margin_config
      CASDOOR_JWKS_URL: http://casdoor:8000/.well-known/jwks
      CASDOOR_ISSUER: http://localhost:8000
      CASDOOR_URL: http://casdoor:8000

  lead-time-config-tests:
    build: ./local_services/lead_time_config
    command: pytest tests/ -v
    profiles: ["test"]
    depends_on:
      db-test-reset:
        condition: service_completed_successfully
      casdoor:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres/transport_deluxe_test
      DB_SCHEMA: lead_time_config
      CASDOOR_JWKS_URL: http://casdoor:8000/.well-known/jwks
      CASDOOR_ISSUER: http://localhost:8000
      CASDOOR_URL: http://casdoor:8000

  costing-engine-tests:
    build: ./local_services/costing_engine
    command: pytest tests/ -v
    profiles: ["test"]
    depends_on:
      db-test-reset:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres/transport_deluxe_test
      DB_SCHEMA: costing_engine

  margin-engine-tests:
    profiles: ["test"]
    build:
      context: ./local_services/margin_engine
      dockerfile: Dockerfile
    command: >
      sh -c "pytest -v"
    depends_on:
      db-test-reset:
        condition: service_completed_successfully
      base-margin-config:
        condition: service_started
      lead-time-config:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres/transport_deluxe_test
      DB_SCHEMA: margin_engine

  pricing-engine-tests:
    profiles: ["test"]
    build:
      context: ./local_services/pricing_engine
      dockerfile: Dockerfile
    command: >
      sh -c "pytest -v"
    depends_on:
      db-test-reset:
        condition: service_completed_successfully
      margin-engine:
        condition: service_started
      costing-engine:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres/transport_deluxe_test
      DB_SCHEMA: pricing_engine
      COSTING_ENGINE_URL: http://costing-engine:8001/costing/estimate
      MARGIN_ENGINE_URL: http://margin-engine:8001/margin/estimate
