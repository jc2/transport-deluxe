exclude: '^persistence/'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        exclude: ^backup/
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix, --select, "E,F,I,UP", --ignore, "E711,E712", --line-length, "120"]
      - id: ruff-format
        args: [--line-length, "120"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        name: mypy (base-margin)
        files: ^local_services/base_margin_config/
        exclude: ^local_services/base_margin_config/tests/
        args: [--config-file=pyproject.toml]
        additional_dependencies: ["pydantic", "sqlmodel", "sqlalchemy", "fastapi", "httpx", "types-python-jose", "pytest"]
      - id: mypy
        name: mypy (driver-tariff)
        files: ^local_services/driver_tariff_config/
        exclude: ^local_services/driver_tariff_config/tests/
        args: [--config-file=pyproject.toml]
        additional_dependencies: ["pydantic", "sqlmodel", "sqlalchemy", "fastapi", "httpx", "types-python-jose", "pytest"]
      - id: mypy
        name: mypy (fuel-cost)
        files: ^local_services/fuel_cost_config/
        exclude: ^local_services/fuel_cost_config/tests/
        args: [--config-file=pyproject.toml]
        additional_dependencies: ["pydantic", "sqlmodel", "sqlalchemy", "fastapi", "httpx", "types-python-jose", "pytest"]
      - id: mypy
        name: mypy (lead-time)
        files: ^local_services/lead_time_config/
        exclude: ^local_services/lead_time_config/tests/
        args: [--config-file=pyproject.toml]
        additional_dependencies: ["pydantic", "sqlmodel", "sqlalchemy", "fastapi", "httpx", "types-python-jose", "pytest"]
      - id: mypy
        name: mypy (costing-engine)
        files: ^local_services/costing_engine/
        exclude: ^local_services/costing_engine/tests/
        args: [--config-file=pyproject.toml, --explicit-package-bases]
        additional_dependencies: ["pydantic", "sqlmodel", "sqlalchemy", "fastapi", "httpx", "types-python-jose", "pytest", "sf-hamilton", "pandas", "numpy", "python-dotenv", "pandas-stubs"]
      - id: mypy
        name: mypy (margin-engine)
        files: ^local_services/margin_engine/
        exclude: ^local_services/margin_engine/tests/
        args: [--config-file=pyproject.toml, --explicit-package-bases]
        additional_dependencies: ["pydantic", "sqlmodel", "sqlalchemy", "fastapi", "httpx", "types-python-jose", "pytest", "sf-hamilton", "pandas", "numpy", "python-dotenv", "pandas-stubs"]
      - id: mypy
        name: mypy (pricing-engine)
        files: ^local_services/pricing_engine/
        exclude: ^local_services/pricing_engine/tests/
        args: [--config-file=pyproject.toml, --explicit-package-bases]
        additional_dependencies: ["pydantic", "sqlmodel", "sqlalchemy", "fastapi", "httpx", "types-python-jose", "pytest", "sf-hamilton", "pandas", "numpy", "python-dotenv", "pandas-stubs"]
      - id: mypy
        name: mypy (transport-deluxe-core)
        files: ^local_services/transport_deluxe_core/
        exclude: ^local_services/transport_deluxe_core/tests/
        args: [--config-file=pyproject.toml, --explicit-package-bases]
        additional_dependencies: ["pydantic", "sqlmodel", "sqlalchemy", "fastapi", "httpx", "pytest"]
