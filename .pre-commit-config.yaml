repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix, --select, "E,F,I,UP", --ignore, "E711,E712", --line-length, "120"]
      - id: ruff-format
        args: [--line-length, "120"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        name: mypy (base-margin)
        files: ^base_margin_config/
        exclude: ^base_margin_config/tests/
        args: [--config-file=pyproject.toml]
        additional_dependencies: ["pydantic", "sqlmodel", "sqlalchemy", "fastapi", "httpx", "types-python-jose", "pytest"]
      - id: mypy
        name: mypy (driver-tariff)
        files: ^driver_tariff_config/
        exclude: ^driver_tariff_config/tests/
        args: [--config-file=pyproject.toml]
        additional_dependencies: ["pydantic", "sqlmodel", "sqlalchemy", "fastapi", "httpx", "types-python-jose", "pytest"]
      - id: mypy
        name: mypy (fuel-cost)
        files: ^fuel_cost_config/
        exclude: ^fuel_cost_config/tests/
        args: [--config-file=pyproject.toml]
        additional_dependencies: ["pydantic", "sqlmodel", "sqlalchemy", "fastapi", "httpx", "types-python-jose", "pytest"]
