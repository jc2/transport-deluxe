    volumes:
      - ./persistence/base-margin-config-db/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U base_margin_config -d base_margin_config"]
      interval: 5s
      timeout: 5s
      retries: 10

  base-margin-config:
    build: ./local_services/base_margin_config
    ports:
      - "8003:8003"
    depends_on:
      base-margin-config-db:
        condition: service_healthy
      casdoor:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://base_margin_config:base_margin_config@base-margin-config-db/base_margin_config
      CASDOOR_JWKS_URL: http://casdoor:8000/.well-known/jwks
