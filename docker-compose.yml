services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./persistence/postgres/data:/var/lib/postgresql/data
      - ./persistence/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: /bin/sh -c "cp /pgpass_src /tmp/pgpass && chmod 600 /tmp/pgpass && /entrypoint.sh"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@transport-deluxe.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - ./persistence/pgadmin:/var/lib/pgadmin
      - ./external_services/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./external_services/pgadmin/pgpass:/pgpass_src:ro

  casdoor:
    image: casbin/casdoor:latest
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - driverName=postgres
      - dataSourceName=host=postgres user=postgres password=postgres dbname=casdoor port=5432 sslmode=disable
    volumes:
      - ./external_services/casdoor/init_data.json:/init_data.json
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/.well-known/jwks || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  fuel-cost-config:
    build: ./local_services/fuel_cost_config
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      casdoor:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres/transport_deluxe
      DB_SCHEMA: fuel_cost_config
      CASDOOR_JWKS_URL: http://casdoor:8000/.well-known/jwks
      CASDOOR_ISSUER: http://localhost:8000
      SESSION_SECRET: your-session-secret-key-here

  driver-tariff-config:
    build: ./local_services/driver_tariff_config
    ports:
      - "8002:8001"
    depends_on:
      postgres:
        condition: service_healthy
      casdoor:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres/transport_deluxe
      DB_SCHEMA: driver_tariff_config
      CASDOOR_JWKS_URL: http://casdoor:8000/.well-known/jwks
      CASDOOR_ISSUER: http://localhost:8000
      SESSION_SECRET: your-session-secret-key-here

  base-margin-config:
    build: ./local_services/base_margin_config
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      casdoor:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres/transport_deluxe
      DB_SCHEMA: base_margin_config
      CASDOOR_JWKS_URL: http://casdoor:8000/.well-known/jwks
      CASDOOR_ISSUER: http://localhost:8000
      SESSION_SECRET: your-session-secret-key-here

  lead-time-config:
    build: ./local_services/lead_time_config
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
      casdoor:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres/transport_deluxe
      DB_SCHEMA: lead_time_config
      CASDOOR_JWKS_URL: http://casdoor:8000/.well-known/jwks
      CASDOOR_ISSUER: http://localhost:8000
      SESSION_SECRET: your-session-secret-key-here

  costing-engine:
    build: ./local_services/costing_engine
    ports:
      - "8005:8001"
    depends_on:
      postgres:
        condition: service_healthy
      fuel-cost-config:
        condition: service_started
      driver-tariff-config:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres/transport_deluxe
      DB_SCHEMA: costing_engine
      SESSION_SECRET: your-session-secret-key-here
      STADIA_API_KEY: ${STADIA_API_KEY}

  margin-engine:
    build: ./local_services/margin_engine
    ports:
      - "8006:8001"
    depends_on:
      postgres:
        condition: service_healthy
      base-margin-config:
        condition: service_started
      lead-time-config:
        condition: service_started
      costing-engine:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres/transport_deluxe
      DB_SCHEMA: margin_engine
      SESSION_SECRET: your-session-secret-key-here

  pricing-engine:
    build: ./local_services/pricing_engine
    ports:
      - "8007:8001"
    depends_on:
      postgres:
        condition: service_healthy
      costing-engine:
        condition: service_started
      margin-engine:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres/transport_deluxe
      DB_SCHEMA: pricing_engine
      COSTING_ENGINE_URL: http://costing-engine:8001/costing/estimate
      MARGIN_ENGINE_URL: http://margin-engine:8001/margin/estimate
