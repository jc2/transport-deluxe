services:
  casdoor-db:
    image: postgres:16
    environment:
      POSTGRES_DB: casdoor
      POSTGRES_USER: casdoor
      POSTGRES_PASSWORD: casdoor
    volumes:
      - ./persistence/casdoor/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casdoor -d casdoor"]
      interval: 5s
      timeout: 5s
      retries: 10

  casdoor:
    image: casbin/casdoor:latest
    ports:
      - "8000:8000"
    depends_on:
      casdoor-db:
        condition: service_healthy
    environment:
      - driverName=postgres
      - dataSourceName=host=casdoor-db user=casdoor password=casdoor dbname=casdoor port=5432 sslmode=disable
    volumes:
      - ./external_services/casdoor/init_data.json:/init_data.json
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/.well-known/jwks || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  fuel-cost-config-db:
    image: postgres:16
    environment:
      POSTGRES_DB: fuel_cost_config
      POSTGRES_USER: fuel_cost_config
      POSTGRES_PASSWORD: fuel_cost_config
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./persistence/fuel-cost-config-db/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fuel_cost_config -d fuel_cost_config"]
      interval: 5s
      timeout: 5s
      retries: 10

  fuel-cost-config:
    build: ./local_services/fuel_cost_config
    ports:
      - "8001:8001"
    depends_on:
      fuel-cost-config-db:
        condition: service_healthy
      casdoor:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://fuel_cost_config:fuel_cost_config@fuel-cost-config-db/fuel_cost_config
      CASDOOR_JWKS_URL: http://casdoor:8000/.well-known/jwks
      CASDOOR_ISSUER: http://localhost:8000
      SESSION_SECRET: your-session-secret-key-here

  driver-tariff-config-db:
    image: postgres:16
    environment:
      POSTGRES_DB: driver_tariff_config
      POSTGRES_USER: driver_tariff_config
      POSTGRES_PASSWORD: driver_tariff_config
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./persistence/driver-tariff-config-db/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U driver_tariff_config -d driver_tariff_config"]
      interval: 5s
      timeout: 5s
      retries: 10

  driver-tariff-config:
    build: ./local_services/driver_tariff_config
    ports:
      - "8002:8001"
    depends_on:
      driver-tariff-config-db:
        condition: service_healthy
      casdoor:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://driver_tariff_config:driver_tariff_config@driver-tariff-config-db/driver_tariff_config
      CASDOOR_JWKS_URL: http://casdoor:8000/.well-known/jwks
      CASDOOR_ISSUER: http://localhost:8000
      SESSION_SECRET: your-session-secret-key-here

  base-margin-config-db:
